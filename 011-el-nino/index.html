<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>011 · El Niño — anomalia | temperatura real</title>
  <!--
    011 — DUO RESPONSIVO (s.28 + versao mobile, redesenho).
      Os DOIS estados sempre presentes (ANOMALIA + TEMPERATURA REAL) -> a comparacao e o coracao da obra.
      LAYOUT por ORIENTACAO:
        - PAISAGEM (desktop e celular deitado): lado a lado.
        - RETRATO  (celular em pe): empilhado (um em cima do outro). Gira o aparelho -> reflui sozinho.
      SINCRONIA sempre disponivel (tempo + movimento): a ESQUERDA/CIMA comanda, a DIREITA/BAIXO segue.
      Os caps de performance (DPR, bloom off, antialias off, touch) vivem dentro de cada globo.
  -->
  <style>
    html, body { margin: 0; height: 100%; background: #04060d; overflow: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif; }
    #wrap { display: flex; flex-direction: column; width: 100vw; height: 100vh; height: 100dvh; }

    /* --- barra de topo: rotulos (desktop) + sincronia (sempre) --- */
    #bar { position: relative; display: flex; align-items: stretch; flex: 0 0 auto; min-height: 34px;
      background: #070b12; border-bottom: 1px solid #161b24; }
    .labels { flex: 1; display: flex; }
    .labels .lbl { flex: 1; min-width: 0; display: flex; align-items: center; justify-content: center;
      gap: 8px; color: #eaf2ff; font-size: 12.5px; border-left: 1px solid #161b24; }
    .labels .lbl:first-child { border-left: none; }
    .labels .lbl b { font-size: 13px; letter-spacing: .3px; }
    .labels .lbl .sub { color: #93a3b8; font-size: 11.5px; }
    #sync { position: absolute; left: 50%; top: 4px; transform: translateX(-50%); z-index: 9;
      display: flex; gap: 6px; }
    #sync label { display: flex; align-items: center; gap: 6px; color: #cfe0ff; font-size: 12px;
      background: rgba(8,16,30,.9); border: 1px solid rgba(150,180,230,.4); border-radius: 8px;
      padding: 3px 10px; cursor: pointer; user-select: none; white-space: nowrap;
      -webkit-tap-highlight-color: transparent; }
    #sync label.on { background: #1f6f3f; border-color: #2ea05a; color: #fff; }
    #sync input { accent-color: #2b6fd6; cursor: pointer; }

    #globes { display: flex; flex: 1; min-height: 0; flex-direction: row; }
    .half { position: relative; flex: 1; min-width: 0; min-height: 0; border-left: 1px solid #161b24; }
    .half:first-child { border-left: none; }
    .half .tag { position: absolute; left: 8px; bottom: 8px; z-index: 4; display: none;
      background: rgba(8,16,30,.78); border: 1px solid rgba(150,180,230,.35); color: #cfe0ff;
      font-size: 10.5px; font-weight: 600; padding: 2px 8px; border-radius: 7px; pointer-events: none; }
    iframe { width: 100%; height: 100%; border: 0; display: block; background: #04060d; }

    /* CELULAR (toque): esconde os rotulos da barra, poe a sincronia centralizada e tap-friendly,
       e mostra uma etiqueta por globo (pra saber qual e qual quando empilhado). */
    @media (pointer: coarse), (max-width: 768px) {
      .labels { display: none; }
      #sync { position: static; transform: none; flex: 1; justify-content: center; flex-wrap: wrap;
        gap: 8px; padding: 6px; }
      #sync label { font-size: 12.5px; padding: 7px 12px; }
      .half .tag { display: block; }
    }
    /* RETRATO: empilha um em cima do outro. PAISAGEM: lado a lado (regra base). */
    @media (orientation: portrait) {
      #globes { flex-direction: column; }
      .half { border-left: none; border-top: 1px solid #161b24; }
      .half:first-child { border-top: none; }
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="bar">
      <div class="labels">
        <div class="lbl"><b>v1 · ANOMALIA</b> <span class="sub">o El Niño salta na cor</span></div>
        <div class="lbl"><b>v2 · TEMPERATURA REAL</b> <span class="sub">cor = °C · agitação = El Niño</span></div>
      </div>
      <div id="sync">
        <label id="lblTempo"><input type="checkbox" id="ckTempo"> sincronizar tempo</label>
        <label id="lblMov"><input type="checkbox" id="ckMov"> sincronizar movimento</label>
      </div>
    </div>
    <div id="globes">
      <div class="half"><span class="tag">Anomalia</span><iframe id="ifrA" title="anomalia" loading="eager"></iframe></div>
      <div class="half"><span class="tag">Temperatura real</span><iframe id="ifrB" title="temperatura real" loading="eager"></iframe></div>
    </div>
  </div>

  <script>
    // Carrega SEMPRE os dois (a comparacao e a obra). O layout (lado a lado / empilhado) e so CSS.
    const ifrA = document.getElementById('ifrA');   // CIMA/ESQUERDA = comanda
    const ifrB = document.getElementById('ifrB');   // BAIXO/DIREITA  = segue
    ifrA.src = 'globo-mar-v1.html';
    ifrB.src = 'globo-mar-v2.html';

    const ckTempo = document.getElementById('ckTempo'), lblTempo = document.getElementById('lblTempo');
    const ckMov   = document.getElementById('ckMov'),   lblMov   = document.getElementById('lblMov');
    let syncTempo = false, syncMov = false;

    // relay: A comanda; repassa o estado pra B quando a sincronia esta ligada.
    window.addEventListener('message', (e) => {
      if (e.source !== ifrA.contentWindow) return;
      const m = e.data; if (!m || !m.duoState) return;
      if (syncTempo) ifrB.contentWindow.postMessage({ duoCmd: 'frame', t: m.t }, '*');
      if (syncMov && m.pov) ifrB.contentWindow.postMessage({ duoCmd: 'cam', pov: m.pov }, '*');
    });
    ckTempo.addEventListener('change', () => {
      syncTempo = ckTempo.checked; lblTempo.classList.toggle('on', syncTempo);
      ifrB.contentWindow.postMessage({ duoCmd: syncTempo ? 'follow' : 'unfollow' }, '*');
    });
    ckMov.addEventListener('change', () => {
      syncMov = ckMov.checked; lblMov.classList.toggle('on', syncMov);
      ifrB.contentWindow.postMessage({ duoCmd: syncMov ? 'camlock' : 'camfree' }, '*');
    });
  </script>
</body>
</html>
