<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>011 · El Niño — anomalia | temperatura real</title>
  <!--
    011 — DUO RESPONSIVO (s.28 + versao mobile).
      DESKTOP: os dois estados lado a lado (ANOMALIA | TEMPERATURA REAL), sincronizados por postMessage.
      CELULAR: UM globo so + toggle (Anomalia / Temperatura real) -> 1 contexto WebGL, metade da carga.
        (a comparacao lado a lado e gesto de tela grande; no telefone o duo fica ilegivel e pesado.)
      Os caps de performance (DPR, bloom off, antialias off, touch) vivem dentro de cada globo.
  -->
  <style>
    html, body { margin: 0; height: 100%; background: #04060d; overflow: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif; }
    #wrap { display: flex; flex-direction: column; width: 100vw; height: 100vh; height: 100dvh; }

    /* --- barra DESKTOP: rotulos + sincronia --- */
    #bar { position: relative; display: flex; align-items: stretch; height: 34px; flex: 0 0 34px;
      background: #070b12; border-bottom: 1px solid #161b24; }
    #bar .lbl { flex: 1; min-width: 0; display: flex; align-items: center; justify-content: center;
      gap: 8px; color: #eaf2ff; font-size: 12.5px; border-left: 1px solid #161b24; }
    #bar .lbl:first-child { border-left: none; }
    #bar .lbl b { font-size: 13px; letter-spacing: .3px; }
    #bar .lbl .sub { color: #93a3b8; font-size: 11.5px; }
    #sync { position: absolute; left: 50%; top: 4px; transform: translateX(-50%); z-index: 9;
      display: flex; gap: 6px; }
    #sync label { display: flex; align-items: center; gap: 6px; color: #cfe0ff; font-size: 12px;
      background: rgba(8,16,30,.9); border: 1px solid rgba(150,180,230,.4); border-radius: 8px;
      padding: 3px 10px; cursor: pointer; user-select: none; white-space: nowrap; }
    #sync label.on { background: #1f6f3f; border-color: #2ea05a; color: #fff; }
    #sync input { accent-color: #2b6fd6; cursor: pointer; }

    /* --- barra MOBILE: toggle entre os dois estados --- */
    #mbar { display: none; flex: 0 0 48px; align-items: center; gap: 8px; padding: 0 10px;
      background: #070b12; border-bottom: 1px solid #161b24; }
    #mbar button { flex: 1; height: 36px; border-radius: 9px; cursor: pointer;
      border: 1px solid rgba(150,180,230,.35); background: rgba(8,16,30,.72); color: #cfe0ff;
      font-size: 13px; font-weight: 600; -webkit-tap-highlight-color: transparent; }
    #mbar button.on { background: #2b6fd6; color: #fff; border-color: #5b8cff; }

    #globes { display: flex; flex: 1; min-height: 0; }
    .half { position: relative; flex: 1; min-width: 0; border-left: 1px solid #161b24; }
    .half:first-child { border-left: none; }
    iframe { width: 100%; height: 100%; border: 0; display: block; background: #04060d; }

    /* --- ponto de virada: celular --- */
    @media (max-width: 768px) {
      #bar { display: none; }
      #mbar { display: flex; }
      #halfB { display: none; }     /* mobile: um globo so (o ifrB nem carrega) */
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="bar">
      <div class="lbl"><b>v1 · ANOMALIA</b> <span class="sub">desvio da média — o El Niño salta na cor</span></div>
      <div class="lbl"><b>v2 · TEMPERATURA REAL</b> <span class="sub">cor = °C real · agitação = El Niño</span></div>
      <div id="sync">
        <label id="lblTempo"><input type="checkbox" id="ckTempo"> sincronizar tempo</label>
        <label id="lblMov"><input type="checkbox" id="ckMov"> sincronizar movimento</label>
      </div>
    </div>
    <div id="mbar">
      <button id="tgA" class="on">Anomalia</button>
      <button id="tgB">Temperatura real</button>
    </div>
    <div id="globes">
      <div class="half" id="halfA"><iframe id="ifrA" title="anomalia" loading="eager"></iframe></div>
      <div class="half" id="halfB"><iframe id="ifrB" title="temperatura real" loading="eager"></iframe></div>
    </div>
  </div>

  <script>
    const V1 = 'globo-mar-v1.html', V2 = 'globo-mar-v2.html';
    const ifrA = document.getElementById('ifrA');
    const ifrB = document.getElementById('ifrB');

    // layout pela largura da viewport (aqui e a janela do TOPO, entao a largura e do device).
    const mobileLayout = matchMedia('(max-width: 768px)').matches;

    if (mobileLayout) {
      // ---- CELULAR: um globo so, toggle troca o estado (so ifrA carrega -> 1 contexto WebGL) ----
      const tgA = document.getElementById('tgA');
      const tgB = document.getElementById('tgB');
      let cur = 'B';                 // abre na TEMPERATURA REAL (a obra final: a temperatura governa)
      ifrA.src = V2;
      tgB.classList.add('on'); tgA.classList.remove('on');
      function mostra(which) {
        if (which === cur) return;   // ja esta nesse -> nao recarrega
        cur = which;
        ifrA.src = (which === 'A') ? V1 : V2;
        tgA.classList.toggle('on', which === 'A');
        tgB.classList.toggle('on', which === 'B');
      }
      tgA.addEventListener('click', () => mostra('A'));
      tgB.addEventListener('click', () => mostra('B'));
    } else {
      // ---- DESKTOP: o duo lado a lado + sincronia (a ESQUERDA comanda; a DIREITA segue) ----
      ifrA.src = V1; ifrB.src = V2;
      const ckTempo = document.getElementById('ckTempo'), lblTempo = document.getElementById('lblTempo');
      const ckMov   = document.getElementById('ckMov'),   lblMov   = document.getElementById('lblMov');
      let syncTempo = false, syncMov = false;

      window.addEventListener('message', (e) => {
        if (e.source !== ifrA.contentWindow) return;
        const m = e.data; if (!m || !m.duoState) return;
        if (syncTempo) ifrB.contentWindow.postMessage({ duoCmd: 'frame', t: m.t }, '*');
        if (syncMov && m.pov) ifrB.contentWindow.postMessage({ duoCmd: 'cam', pov: m.pov }, '*');
      });
      ckTempo.addEventListener('change', () => {
        syncTempo = ckTempo.checked; lblTempo.classList.toggle('on', syncTempo);
        ifrB.contentWindow.postMessage({ duoCmd: syncTempo ? 'follow' : 'unfollow' }, '*');
      });
      ckMov.addEventListener('change', () => {
        syncMov = ckMov.checked; lblMov.classList.toggle('on', syncMov);
        ifrB.contentWindow.postMessage({ duoCmd: syncMov ? 'camlock' : 'camfree' }, '*');
      });
    }
  </script>
</body>
</html>
