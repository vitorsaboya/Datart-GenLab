<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banner de Novidades — Arcade do Pinguim</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
    font-family: "Comic Sans MS", "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at 50% 0%, #2a2a5e 0%, #14143a 60%, #0a0a22 100%);
    color: #fff; text-align: center;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px 12px 40px;
  }
  h1 { font-size: 22px; text-shadow: 0 0 12px #6cf; margin-bottom: 4px; }
  .dica { opacity: .8; font-size: 15px; margin-bottom: 16px; line-height: 1.4; max-width: 520px; }
  #tela { width: 100%; max-width: 520px; height: auto; border-radius: 18px;
    box-shadow: 0 14px 44px rgba(0,0,0,.55); background:#0a0a22; }
  .botoes { margin-top: 18px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  button {
    font-family: inherit; font-size: 18px; font-weight: bold;
    padding: 13px 26px; border: none; border-radius: 14px; cursor: pointer;
    background: linear-gradient(180deg, #6cf, #38a); color: #04122a;
    box-shadow: 0 5px 0 #1d5c82; transition: transform .05s;
  }
  button.ghost { background: rgba(255,255,255,.12); color: #fff; box-shadow: 0 5px 0 rgba(0,0,0,.3); }
  button:active { transform: translateY(3px); box-shadow: 0 2px 0 #1d5c82; }
  .ajuda { margin-top: 16px; font-size: 13px; opacity: .6; max-width: 440px; line-height: 1.5; }
</style>
</head>
<body>
  <h1>🖼️ Banner de Novidades</h1>
  <p class="dica">Aperte <b>Baixar imagem</b> e mande no seu grupo pra Duda, a Manuzinha e a galera verem o que é novo no Arcade!</p>
  <canvas id="tela" width="1080" height="1080"></canvas>
  <div class="botoes">
    <button id="btnBaixar">📥 Baixar imagem</button>
    <button class="ghost" id="btnAbrir">🔗 Copiar link do jogo</button>
  </div>
  <p class="ajuda" id="ajuda">No celular: segure o dedo na imagem pra salvar ou compartilhar. No computador: use o botão Baixar.</p>

<script>
const LINK = 'vitorsaboya.github.io/Datart-GenLab/jogos-do-benjamin';
// as novidades do banner (pra atualizar depois, é só mexer aqui)
const NOVIDADES = [
  { i:'🏃', t:'Jogo novo: Duas Pistas!' },
  { i:'🎁', t:'Prêmio diário — jogue todo dia!' },
  { i:'⚽', t:'Pênalti mais difícil (3 vidas)' },
  { i:'🎯', t:'Canhão: alvo voador!' },
  { i:'🎨', t:'Cores: azul + amarelo = verde!' }
];

const cv = document.getElementById('tela');
const ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;

// quebra o texto em várias linhas que caibam na largura
function linhas(texto, maxLarg){
  const pal = texto.split(' '); const out = []; let l = '';
  for (const p of pal){
    const teste = l ? l + ' ' + p : p;
    if (ctx.measureText(teste).width > maxLarg && l){ out.push(l); l = p; }
    else l = teste;
  }
  if (l) out.push(l);
  return out;
}

function desenhar(){
  // fundo
  const g = ctx.createRadialGradient(W/2, 0, 60, W/2, H*0.4, H);
  g.addColorStop(0, '#2a2a5e'); g.addColorStop(.6, '#14143a'); g.addColorStop(1, '#0a0a22');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

  // moldura
  ctx.strokeStyle = 'rgba(120,210,255,.5)'; ctx.lineWidth = 6;
  roundRect(28, 28, W-56, H-56, 34); ctx.stroke();

  ctx.textAlign = 'center';

  // topo: pinguim + título
  ctx.textBaseline = 'middle';
  ctx.font = '96px serif'; ctx.fillText('🐧', W/2, 150);
  ctx.font = 'bold 78px "Comic Sans MS", sans-serif';
  ctx.shadowColor = '#6cf'; ctx.shadowBlur = 26;
  ctx.fillStyle = '#eaf6ff'; ctx.fillText('Arcade do Pinguim', W/2, 260);
  ctx.shadowBlur = 0;

  // faixa NOVIDADES
  ctx.fillStyle = '#ffb066';
  roundRect(W/2 - 250, 315, 500, 74, 37); ctx.fill();
  ctx.fillStyle = '#2a1500'; ctx.font = 'bold 46px "Comic Sans MS", sans-serif';
  ctx.fillText('✨ NOVIDADES! ✨', W/2, 353);

  // itens (cada um numa faixinha, uma linha só)
  ctx.textAlign = 'left';
  let y = 460;
  const xIco = 105, xTxt = 205, maxTxt = W - xTxt - 80, rowH = 92;
  for (const n of NOVIDADES){
    // faixinha de fundo
    ctx.fillStyle = 'rgba(255,255,255,.05)';
    roundRect(70, y, W-140, 74, 16); ctx.fill();
    ctx.textBaseline = 'middle';
    ctx.font = '50px serif'; ctx.fillStyle = '#fff';
    ctx.fillText(n.i, xIco, y + 40);
    ctx.font = '42px "Comic Sans MS", sans-serif'; ctx.fillStyle = '#eef4ff';
    const ls = linhas(n.t, maxTxt);
    ls.slice(0,1).forEach(ln => ctx.fillText(ln, xTxt, y + 40));
    y += rowH;
  }

  // rodapé: chamada + link
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffe14d'; ctx.font = 'bold 44px "Comic Sans MS", sans-serif';
  ctx.fillText('👉 Entra pra jogar de graça!', W/2, H - 150);
  ctx.fillStyle = '#9cc8ff'; ctx.font = '32px "Comic Sans MS", sans-serif';
  ctx.fillText(LINK, W/2, H - 92);
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function baixar(){
  const a = document.createElement('a');
  a.download = 'novidades-arcade-do-pinguim.png';
  a.href = cv.toDataURL('image/png');
  a.click();
}
document.getElementById('btnBaixar').addEventListener('click', baixar);
document.getElementById('btnAbrir').addEventListener('click', () => {
  const url = 'https://' + LINK;
  if (navigator.clipboard) navigator.clipboard.writeText(url).then(
    () => { document.getElementById('ajuda').textContent = '✅ Link copiado! Agora é só colar no seu grupo.'; },
    () => { document.getElementById('ajuda').textContent = url; }
  );
  else document.getElementById('ajuda').textContent = url;
});

// os emojis podem demorar um tiquinho pra carregar: desenha ao abrir e de novo logo depois
desenhar();
window.addEventListener('load', () => setTimeout(desenhar, 300));
</script>
</body>
</html>
